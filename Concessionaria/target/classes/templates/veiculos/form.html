<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulário Veículo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">

    <header class="border-b border-zinc-800 px-10 py-4 flex items-center justify-between">
        <a href="/" class="text-2xl font-black tracking-widest uppercase">Auto<span class="text-red-500">CRUD</span></a>
        <span class="text-zinc-500 text-xs tracking-widest uppercase">Veículos</span>
    </header>

    <main class="flex items-center justify-center px-4 py-16">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-8 w-full max-w-md">

            <h2 class="text-3xl font-black uppercase tracking-wide mb-8">
                Novo <span class="text-red-500">Veículo</span>
            </h2>

            <form th:action="@{/veiculos/salvar}" th:object="${veiculo}" method="post" class="flex flex-col gap-5">
                <input type="hidden" th:field="*{id}"/>

                <div class="flex flex-col gap-1">
                    <label class="text-xs uppercase tracking-widest text-zinc-500">Marca</label>
                    <select name="marcaId"
                            class="bg-zinc-800 border border-zinc-700 rounded px-4 py-2.5 text-sm text-white focus:outline-none focus:border-red-500 transition">
                        <option value="">Selecione uma marca</option>
                        <option th:each="marca : ${marcas}"
                                th:value="${marca.id}"
                                th:text="${marca.nome}">
                        </option>
                    </select>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-xs uppercase tracking-widest text-zinc-500">Modelo</label>
                    <input type="text" th:field="*{modelo}"
                           class="bg-zinc-800 border border-zinc-700 rounded px-4 py-2.5 text-sm text-white focus:outline-none focus:border-red-500 transition"/>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-xs uppercase tracking-widest text-zinc-500">Ano</label>
                    <input type="number" th:field="*{ano}"
                           class="bg-zinc-800 border border-zinc-700 rounded px-4 py-2.5 text-sm text-white focus:outline-none focus:border-red-500 transition"/>
                </div>

                <button type="submit"
                        class="bg-red-600 hover:bg-red-500 text-white font-semibold uppercase tracking-widest text-sm py-2.5 rounded transition mt-2">
                    Salvar
                </button>
            </form>

            <a href="/" class="block text-center text-zinc-500 hover:text-white text-xs uppercase tracking-widest mt-6 transition">
                ← Voltar
            </a>
        </div>
    </main>

</body>
</html>
