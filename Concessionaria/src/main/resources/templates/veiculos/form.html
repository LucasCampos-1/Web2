<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulário Veículo</title>
</head>
<body>

    <h1>Novo Veículo</h1>

    <form th:action="@{/veiculos/salvar}" th:object="${veiculo}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <label>Marca:</label>
        <select name="marcaId">
            <option value="">Selecione uma marca</option>
            <option th:each="marca : ${marcas}" 
                    th:value="${marca.id}" 
                    th:text="${marca.nome}">
            </option>
        </select>

        <br/>

        <label>Modelo:</label>
        <input type="text" th:field="*{modelo}"/>

        <br/>

        <label>Ano:</label>
        <input type="number" th:field="*{ano}"/>

        <br/>

        <button type="submit">Salvar</button>
    </form>

    <a href="/veiculos">Voltar</a>

</body>
</html>
