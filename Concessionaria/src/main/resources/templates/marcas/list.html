<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Marcas</title>
</head>

<body>
    <h1>Marcas</h1>

    <a th:href="@{/marcas/nova}">Adicionar Marca</a>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>País de Origem</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="marca : ${marcas}">
                <td th:text="${marca.id}"></td>
                <td th:text="${marca.nome}"></td>
                <td th:text="${marca.paisOrigem}"></td>
                <td>
                    <a th:href="@{/marcas/editar/{id}(id=${marca.id})}">Editar</a>
                    <a th:href="@{/marcas/deletar/{id}(id=${marca.id})}">Deletar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
